# Host nginx server block for apocalypsetracker.com.
# Matches the existing setup: host nginx proxies to a localhost-bound container
# port (the frontend publishes 127.0.0.1:8090 in deploy/docker-compose.prod.yml).
#
# Install:
#   sudo cp deploy/nginx/apocalypsetracker.conf /etc/nginx/sites-available/apocalypsetracker.conf
#   sudo ln -s /etc/nginx/sites-available/apocalypsetracker.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# Then provision TLS (certbot will rewrite this block to add 443 + redirect):
#   sudo certbot --nginx -d apocalypsetracker.com

server {
    listen 80;
    listen [::]:80;
    server_name apocalypsetracker.com;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}
